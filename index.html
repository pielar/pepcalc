<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pierce Larson — Identity Security</title>

  <!-- Inline SVG favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230d0d0d'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui,sans-serif' font-size='14' font-weight='700' fill='%23e8e8e8'>PL</text></svg>" />

  <style>
    /* ── Tokens ── */
    :root {
      --transition-theme: background 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    [data-theme="dark"] {
      --bg:          #0d0d0d;
      --surface:     #1a1a1a;
      --border:      #242424;
      --border-hover:#333;
      --text:        #e8e8e8;
      --text-strong: #f0f0f0;
      --text-muted:  #666;
      --text-dim:    #3a3a3a;
      --avatar-bg:   linear-gradient(135deg, #3a3a3a, #1e1e1e);
      --avatar-color:#888;
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.5);
      --toggle-bg:   #1a1a1a;
      --toggle-icon: "☀️";
    }

    [data-theme="light"] {
      --bg:          #f5f5f5;
      --surface:     #ffffff;
      --border:      #e0e0e0;
      --border-hover:#c0c0c0;
      --text:        #333;
      --text-strong: #111;
      --text-muted:  #888;
      --text-dim:    #ccc;
      --avatar-bg:   linear-gradient(135deg, #ddd, #f0f0f0);
      --avatar-color:#555;
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.1);
      --toggle-bg:   #ffffff;
      --toggle-icon: "🌙";
    }

    /* ── Reset ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Base ── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-theme);
    }

    /* ── Layout ── */
    .container {
      width: 100%;
      max-width: 480px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--toggle-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: var(--transition-theme), transform 0.15s ease;
      z-index: 100;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
      border-color: var(--border-hover);
    }

    /* ── Profile ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--avatar-bg);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--avatar-color);
      letter-spacing: -1px;
      user-select: none;
      transition: var(--transition-theme);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-strong);
      transition: color 0.25s ease;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 500;
      transition:
        background 0.2s ease,
        border-color 0.2s ease,
        box-shadow 0.2s ease,
        transform 0.15s ease,
        color 0.25s ease;
    }

    .link-card:hover {
      background: var(--surface);
      border-color: var(--border-hover);
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }

    .link-card:active {
      transform: translateY(-1px);
      box-shadow: none;
    }

    .link-card .label {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .link-card .title {
      color: var(--text-strong);
      transition: color 0.25s ease;
    }

    .link-card .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
      transition: color 0.25s ease;
    }

    .link-card .arrow {
      color: var(--text-muted);
      font-size: 1rem;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .link-card:hover .arrow {
      color: var(--text-strong);
      transform: translate(2px, -2px);
    }

    /* ── Footer ── */
    footer {
      font-size: 0.75rem;
      color: var(--text-dim);
      transition: color 0.25s ease;
    }

    /* ── Entrance animations ── */
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate {
      opacity: 0;
      animation: fadeSlideUp 0.5s ease forwards;
    }

    .avatar       { animation-delay: 0.05s; }
    h1            { animation-delay: 0.15s; }
    .links        { animation-delay: 0.25s; }
    .link-card    { opacity: 1; } /* inherits from .links animation */
    footer        { animation-delay: 0.35s; }
    .theme-toggle { animation-delay: 0.0s;  }
  </style>
</head>
<body>

  <!-- Theme toggle -->
  <button class="theme-toggle animate" id="themeToggle" aria-label="Toggle theme" title="Toggle light/dark mode">🌙</button>

  <div class="container">
    <div class="profile">
      <div class="avatar animate">PL</div>
      <h1 class="animate">Pierce Larson</h1>
    </div>

    <div class="links animate">
      <a class="link-card" href="https://delinea.com" target="_blank" rel="noopener noreferrer">
        <div class="label">
          <span class="title">Delinea</span>
          <span class="subtitle">delinea.com</span>
        </div>
        <span class="arrow">↗</span>
      </a>
    </div>

    <footer class="animate">pierce larson</footer>
  </div>

  <script>
    const root = document.documentElement;
    const btn  = document.getElementById('themeToggle');

    // Apply saved preference before paint to avoid flash
    const saved = localStorage.getItem('theme');
    const preferred = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    setTheme(preferred, false);

    btn.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      setTheme(next, true);
    });

    function setTheme(theme, save) {
      root.setAttribute('data-theme', theme);
      btn.textContent = theme === 'dark' ? '☀️' : '🌙';
      btn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
      if (save) localStorage.setItem('theme', theme);
    }
  </script>
</body>
</html>
